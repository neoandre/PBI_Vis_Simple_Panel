name: Build Power BI Visual (.pbiviz)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Install Power BI Visuals Tools (pbiviz)
        run: npm install -g powerbi-visuals-tools@latest
      - name: Package visual
        run: npx pbiviz package --verbose
      - name: Verify package file
        run: |
          echo "List dist/"; ls -la dist || true
          test -n "$(find dist -maxdepth 1 -name '*.pbiviz' -print -quit)" || (echo "No .pbiviz found in dist/ after packaging" && exit 2)
      - uses: actions/upload-artifact@v4
        with:
          name: simple-card-visual
          path: dist/*.pbiviz
          if-no-files-found: error
