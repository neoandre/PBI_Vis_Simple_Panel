
name: build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g powerbi-visuals-tools@5.6.0
      - run: npm ci
      - name: Validate JSON
        run: node -e "['capabilities.json','pbiviz.json','package.json'].forEach(f=>{JSON.parse(require('fs').readFileSync(f,'utf8')); console.log('OK',f)})"
      - run: npx pbiviz package --verbose
      - uses: actions/upload-artifact@v4
        with:
          name: pbiviz
          path: dist/*.pbiviz
